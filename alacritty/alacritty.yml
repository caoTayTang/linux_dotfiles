import:
 - ~/.config/alacritty/themes/themes/catpuccin.yaml


env:
  TERM: xterm-256color

window:
  dimensions:
   columns: 90
   lines: 24

  position:
   x: 350
   y: 155

  padding:
   x: 0
   y: 0

  dynamic_title: true
  dynamic_padding: true

    #decorations: none la zenmode, tat het may cai bar
  decorations: Full

  opacity: 0.9

  startup_mode: Windowed

  title: Alacritty

  dynamic_title: true

  class:
    instance: Alacritty
    general: Alacritty

  resize_increments: true

scrolling:
  history: 10000
  multiplier: 3

font:
  size: 17
  normal:
    family: JetBrains Mono Nerd Font
    style: Regular
  bold:
    family: JetBrains Mono Nerd Font
    style: Bold
  italic:
    family: JetBrains Mono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrains Mono Nerd Font
    style: Bold Italic
selection:
  save_to_clipboard: false

cursor:
  style:
    shape: Block

live_config_reload: true

key_bindings:
  - { key: Return,   mods: Control|Shift, action: SpawnNewInstance }

